<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - TalentTrade</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-bg-gradient"></div>
        <div class="auth-content">
            <div class="auth-header">
                <a href="index.html" class="brand-link">
                    <div class="brand-mark-small">TT</div>
                    <div>
                        <span class="brand-name">TalentTrade</span>
                    </div>
                </a>
            </div>

            <div class="auth-card glassmorphism">
                <div class="auth-card-header">
                    <h1>Checkout</h1>
                    <p>Continue Purchase on TalentTrade.</p>
                </div>
                <div id="checkoutContent" class="space-y-6">
                    <div class="checkout-summary glass-card p-6 rounded-2xl bg-surface-container-low">
                        <h2 class="font-headline-sm mb-3">Order Summary</h2>
                        <div id="checkoutItem" class="space-y-3"></div>
                        <div class="checkout-total mt-4 flex justify-between items-center font-bold text-on-surface">
                            <span>Total</span>
                            <span id="checkoutTotal">$0.00</span>
                        </div>
                    </div>
                    <button id="continuePurchaseBtn" class="auth-btn primary-btn w-full">Continue Purchase</button>
                </div>
            </div>

            <div class="auth-footer-text">
                <p>&copy; 2026 TalentTrade. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('productId');
            const currentUser = TalentTrade.auth.getCurrentUser();

            if (!currentUser) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }

            if (!productId) {
                document.getElementById('checkoutContent').innerHTML = '<p class="text-on-surface-variant">No item selected for checkout.</p>';
                return;
            }

            const product = TalentTrade.products.getById(productId);
            if (!product) {
                document.getElementById('checkoutContent').innerHTML = '<p class="text-on-surface-variant">The selected item was not found.</p>';
                return;
            }

            const itemContainer = document.getElementById('checkoutItem');
            itemContainer.innerHTML = `
                <div class="flex gap-4 items-center">
                    <img src="${product.image || product.imageUrl || placeholderDataUrl(120, 120, 'No Image')}" alt="${product.title}" class="w-24 h-24 rounded-2xl object-cover" />
                    <div>
                        <p class="font-bold text-on-surface">${product.title}</p>
                        <p class="text-on-surface-variant">${product.creator}</p>
                        <p class="mt-3 text-primary font-semibold">$${product.price}</p>
                    </div>
                </div>
            `;
            document.getElementById('checkoutTotal').textContent = `$${product.price.toFixed(2)}`;

            document.getElementById('continuePurchaseBtn').addEventListener('click', function() {
                window.location.href = 'payment.html?productId=' + encodeURIComponent(productId);
            });
        });
    </script>
</body>
</html>
