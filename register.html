<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - TalentTrade Marketplace</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233192e0'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3ET%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Background Gradient -->
        <div class="auth-bg-gradient"></div>

        <div class="auth-content">
            <!-- Header -->
            <div class="auth-header">
                <a href="index.html" class="brand-link">
                    <div class="brand-mark-small">TT</div>
                    <div>
                        <span class="brand-name">TalentTrade</span>
                    </div>
                </a>
            </div>

            <!-- Register Card -->
            <div class="auth-card glassmorphism auth-card-lg">
                <div class="auth-card-header">
                    <h1>Create Account</h1>
                    <p>Join TalentTrade and start selling or renting today</p>
                </div>

                <form id="registerForm" class="auth-form">
                    <!-- Full Name Field -->
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            class="form-input" 
                            placeholder="John Doe"
                            required
                        />
                        <span class="form-error" id="fullNameError"></span>
                    </div>

                    <!-- Username Field -->
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            class="form-input" 
                            placeholder="johndoe"
                            required
                        />
                        <span class="form-error" id="usernameError"></span>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="you@example.com"
                            required
                        />
                        <span class="form-error" id="emailError"></span>
                    </div>

                    <!-- Mobile Number Field -->
                    <div class="form-group">
                        <label for="mobile" class="form-label">Mobile Number</label>
                        <input 
                            type="tel" 
                            id="mobile" 
                            name="mobile" 
                            class="form-input" 
                            placeholder="+1 (555) 000-0000"
                            required
                        />
                        <span class="form-error" id="mobileError"></span>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-input" 
                            placeholder="••••••••"
                            required
                        />
                        <span class="form-error" id="passwordError"></span>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            class="form-input" 
                            placeholder="••••••••"
                            required
                        />
                        <span class="form-error" id="confirmPasswordError"></span>
                    </div>

                    <!-- Terms Checkbox -->
                    <div class="form-group">
                        <label class="form-checkbox">
                            <input 
                                type="checkbox" 
                                id="termsCheckbox" 
                                name="terms" 
                                required
                            />
                            <span>I agree to the Terms and Conditions</span>
                        </label>
                        <span class="form-error" id="termsError"></span>
                    </div>

                    <!-- General Error Message -->
                    <div id="generalError" class="form-error hidden mb-4"></div>

                    <!-- Success Message -->
                    <div id="successMessage" class="form-success hidden mb-4"></div>

                    <!-- Submit Button -->
                    <button type="submit" class="form-button">Create Account</button>
                </form>

                <!-- Login Link -->
                <p class="auth-footer-text">
                    Already have an account? <a href="login.html" class="auth-link">Sign in here</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
        import { firebaseConfig } from './firebase-config.js';
        import { initFirebaseAuth, registerUser } from './firebase-auth-integration.js';

        // Initialize Firebase app for this page
        const app = initializeApp(firebaseConfig);

        document.addEventListener('DOMContentLoaded', async function() {
            await initFirebaseAuth();

            const registerForm = document.getElementById('registerForm');
            const fullNameInput = document.getElementById('fullName');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const mobileInput = document.getElementById('mobile');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const termsCheckbox = document.getElementById('termsCheckbox');

            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Clear previous errors
                document.querySelectorAll('.form-error').forEach(el => el.textContent = '');
                document.getElementById('generalError').classList.add('hidden');
                document.getElementById('successMessage').classList.add('hidden');

                const fullName = fullNameInput.value.trim();
                const username = usernameInput.value.trim();
                const email = emailInput.value.trim();
                const mobile = mobileInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                const termsAccepted = termsCheckbox.checked;

                // Basic validation (keep existing client checks)
                if (!fullName || !username || !email || !password || password !== confirmPassword || !termsAccepted) {
                    document.getElementById('generalError').textContent = 'Please complete all required fields correctly.';
                    document.getElementById('generalError').classList.remove('hidden');
                    return;
                }

                try {
                    const btn = registerForm.querySelector('button[type="submit"]');
                    const originalText = btn.textContent;
                    btn.textContent = 'Registering...';
                    btn.disabled = true;

                    console.log('🔵 Starting registration...');
                    console.log('Email:', email);
                    console.log('Username:', username);
                    console.log('Full Name:', fullName);
                    console.log('Mobile:', mobile);

                    const user = await registerUser(email, password, username, fullName || '', mobile || '');

                    console.log('🟢 Registration successful!', user);

                    // Persist a normalized client-side currentUser for other pages
                    const currentUser = {
                        uid: user.uid,
                        email: user.email,
                        username: user.username,
                        fullName: user.fullName || fullName,
                        mobile: user.mobile || mobile,
                        avatarUrl: user.avatarUrl
                    };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    localStorage.setItem('talenttradeCurrentUser', JSON.stringify({
                        id: user.uid,
                        uid: user.uid,
                        email: user.email,
                        username: user.username,
                        fullName: user.fullName || fullName,
                        mobile: user.mobile || mobile,
                        avatarUrl: user.avatarUrl
                    }));

                    document.getElementById('successMessage').textContent = `Welcome, ${user.username}! Redirecting to sign in...`;
                    document.getElementById('successMessage').classList.remove('hidden');

                    setTimeout(() => window.location.href = 'login.html', 1200);
                } catch (err) {
                    console.error('🔴 Registration FAILED:', err);
                    document.getElementById('generalError').textContent = err.message || 'Registration failed';
                    document.getElementById('generalError').classList.remove('hidden');

                    const btn = registerForm.querySelector('button[type="submit"]');
                    btn.textContent = 'Create Account';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
