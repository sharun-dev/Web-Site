<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - TalentTrade Marketplace</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233192e0'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial,sans-serif'%3ET%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Background Gradient -->
        <div class="auth-bg-gradient"></div>

        <div class="auth-content">
            <!-- Header -->
            <div class="auth-header">
                <a href="index.html" class="brand-link">
                    <div class="brand-mark-small">TT</div>
                    <div>
                        <span class="brand-name">TalentTrade</span>
                    </div>
                </a>
            </div>

            <!-- Login Card -->
            <div class="auth-card glassmorphism">
                <div class="auth-card-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to continue to your dashboard</p>
                </div>

                <form id="loginForm" class="auth-form">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input" 
                            placeholder="you@example.com"
                            required
                        />
                        <span class="form-error" id="emailError"></span>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input" 
                                placeholder="••••••••"
                                required
                            />
                            <button type="button" class="password-toggle" id="passwordToggle">👁</button>
                        </div>
                        <span class="form-error" id="passwordError"></span>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe" />
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password-link">Forgot password?</a>
                    </div>

                    <!-- Error Message -->
                    <div class="alert alert-error hidden" id="generalError"></div>

                    <!-- Success Message -->
                    <div class="alert alert-success hidden" id="successMessage"></div>

                    <!-- Login Button -->
                    <button type="submit" class="auth-btn primary-btn">Sign In</button>
                </form>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>Or continue with</span>
                </div>

                <!-- Social Login Buttons -->
                <div class="social-login">
                    <button type="button" class="social-btn google-btn" id="googleLogin">
                        <span>Google</span>
                    </button>
                    <button type="button" class="social-btn facebook-btn" id="facebookLogin">
                        <span>Facebook</span>
                    </button>
                </div>

                <!-- Sign Up Link -->
                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html" class="auth-link">Sign up here</a></p>
                </div>
            </div>

            <!-- Footer -->
            <div class="auth-footer-text">
                <p>&copy; 2026 TalentTrade. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
        import { firebaseConfig } from './firebase-config.js';
        import { initFirebaseAuth, loginUser } from './firebase-auth-integration.js';

        const app = initializeApp(firebaseConfig);

        document.addEventListener('DOMContentLoaded', async function() {
            await initFirebaseAuth();

            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberMeCheckbox = document.getElementById('rememberMe');
            const params = new URLSearchParams(window.location.search);
            const redirectUrl = params.get('redirect') || 'index.html';

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                document.getElementById('emailError').textContent = '';
                document.getElementById('passwordError').textContent = '';
                document.getElementById('generalError').classList.add('hidden');
                document.getElementById('successMessage').classList.add('hidden');

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    document.getElementById('generalError').textContent = 'Please enter email and password';
                    document.getElementById('generalError').classList.remove('hidden');
                    return;
                }

                try {
                    const btn = loginForm.querySelector('button[type="submit"]');
                    const originalText = btn.textContent;
                    btn.textContent = 'Signing in...';
                    btn.disabled = true;

                    const user = await loginUser(email, password);

                    const currentUser = {
                        uid: user.uid,
                        email: user.email,
                        username: user.username,
                        fullName: user.username,
                        avatarUrl: user.avatarUrl
                    };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    localStorage.setItem('talenttradeCurrentUser', JSON.stringify({
                        id: user.uid,
                        uid: user.uid,
                        email: user.email,
                        username: user.username,
                        fullName: user.username,
                        avatarUrl: user.avatarUrl,
                        mobile: ''
                    }));

                    document.getElementById('successMessage').textContent = 'Login successful! Redirecting...';
                    document.getElementById('successMessage').classList.remove('hidden');

                    setTimeout(() => window.location.href = redirectUrl, 1000);
                } catch (err) {
                    document.getElementById('generalError').textContent = err.message || 'Login failed';
                    document.getElementById('generalError').classList.remove('hidden');
                }
            });

            const savedEmail = localStorage.getItem('talenttradeRememberedEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberMeCheckbox.checked = true;
            }

            rememberMeCheckbox.addEventListener('change', function() {
                if (this.checked) {
                    localStorage.setItem('talenttradeRememberedEmail', emailInput.value);
                } else {
                    localStorage.removeItem('talenttradeRememberedEmail');
                }
            });
        });
    </script>
</body>
</html>
